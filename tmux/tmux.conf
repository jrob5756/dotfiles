# ~/.tmux.conf
# See tmux/README.md for setup instructions.

## Prefix ------------------------------------------------------------------

# Remap prefix from Ctrl-b to Ctrl-a (easier reach, screen-style convention)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

## General -------------------------------------------------------------------

set -g status-position top      # move the status bar to the top of the window
set -g mouse on                 # enable mouse: click to select pane, drag to resize, scroll to scroll
set -g base-index 1             # start window numbering at 1, not 0
setw -g pane-base-index 1       # start pane numbering at 1, not 0
set -g renumber-windows on      # renumber windows automatically when one is closed
set -g history-limit 10000      # bigger scrollback buffer
set -g escape-time 10           # faster escape-key response (helps Neovim mode switching feel snappy)
set -g focus-events on          # let Neovim know when a pane gains/loses focus (autoread, etc.)
set -sa terminal-overrides ",xterm*:Tc"  # true color support
set -g xterm-keys on             # pass through xterm-style escape sequences (e.g. Shift+Enter) to apps

## Splits ----------------------------------------------------------------

# Open new splits in the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
# More intuitive split keys, matching Neovim's `|` vsplit mapping
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -b -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

## Kill confirmation ----------------------------------------------------------

# Skip the "kill-pane 1? (y/n)" / "kill-window 2? (y/n)" confirmation prompts
bind x kill-pane
bind & kill-window

## Dev layout ----------------------------------------------------------------

# `tmux new -s dev` opens a dev layout: nvim (left ~70%) + the copilot `a`
# alias (right ~30%), both in the session's start directory, focus on nvim.
# Guarded by session name, so ONLY the `dev` session triggers it — every other
# session (plain `tmux`, `tmux new`, other `-s NAME`) stays a normal single pane.
# `a` and `nvim` are launched via send-keys because `a` is a shell alias: it
# only resolves inside an interactive shell that sourced your rc, whereas a
# split-window command would run via `sh -c` and never see the alias.
set-hook -g session-created {
  if-shell -F "#{==:#{session_name},dev}" {
    split-window -h -l 30% -c "#{pane_current_path}"
    send-keys "a" C-m
    select-pane -L
    send-keys "nvim" C-m
  }
}

# Optional manual trigger: build the same dev layout on demand in any window.
bind D split-window -h -l 30% -c "#{pane_current_path}" \; \
       send-keys "a" C-m \; \
       select-pane -L \; \
       send-keys "nvim" C-m

## Pane navigation ---------------------------------------------------------

# Seamless navigation between tmux panes and Neovim splits with the same
# Ctrl-h/j/k/l keys used in the nvim config, via the vim-tmux-navigator plugin
# (see tmux/README.md for the plugin install step this depends on).
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

## Copy mode -----------------------------------------------------------------

setw -g mode-keys vi            # use vi-style keys in copy mode (matches Neovim muscle memory)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Forward OSC 52 clipboard writes from programs running *inside* tmux (Neovim, the
# Copilot CLI, lazygit, etc.) out to the host terminal so they reach the real system
# clipboard (Windows clipboard under WSL/Windows Terminal, pbcopy under macOS, etc.).
# tmux's default is `external`, which only syncs tmux's own copy-mode and silently
# DROPS application OSC 52 sequences — so an app can flash "copied to clipboard" while
# nothing actually lands on the OS clipboard. `on` forwards those sequences (and keeps
# a matching tmux buffer). Portable: relies on OSC 52, no OS-specific copy command.
set -g set-clipboard on

# Allow programs inside tmux to send escape sequences straight through to the outer
# terminal via the `\ePtmux;...\e\\` passthrough wrapper. The Copilot CLI's `/copy`
# uses exactly this to deliver its OSC 52 clipboard *fallback* when its native path
# (clip.exe, which fails when spawned via cmd.exe from a Linux WSL cwd) doesn't work.
# With passthrough off (tmux's default) that wrapped sequence is silently dropped, so
# nothing reaches the Windows clipboard even though the app reports "copied".
set -g allow-passthrough on

## Reload config -------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

## Plugins (via TPM — Tmux Plugin Manager, see README) ------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'
