# ~/.tmux.conf
# See tmux/README.md for setup instructions.

## Prefix ------------------------------------------------------------------

# Remap prefix from Ctrl-b to Ctrl-a (easier reach, screen-style convention)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

## General -------------------------------------------------------------------

set -g mouse on                 # enable mouse: click to select pane, drag to resize, scroll to scroll
set -g base-index 1             # start window numbering at 1, not 0
setw -g pane-base-index 1       # start pane numbering at 1, not 0
set -g renumber-windows on      # renumber windows automatically when one is closed
set -g history-limit 10000      # bigger scrollback buffer
set -g escape-time 10           # faster escape-key response (helps Neovim mode switching feel snappy)
set -g focus-events on          # let Neovim know when a pane gains/loses focus (autoread, etc.)
set -sa terminal-overrides ",xterm*:Tc"  # true color support

## Splits ----------------------------------------------------------------

# Open new splits in the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
# More intuitive split keys, matching Neovim's `|` vsplit mapping
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

## Pane navigation ---------------------------------------------------------

# Seamless navigation between tmux panes and Neovim splits with the same
# Ctrl-h/j/k/l keys used in the nvim config, via the vim-tmux-navigator plugin
# (see tmux/README.md for the plugin install step this depends on).
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

## Copy mode -----------------------------------------------------------------

setw -g mode-keys vi            # use vi-style keys in copy mode (matches Neovim muscle memory)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

## Reload config -------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

## Plugins (via TPM — Tmux Plugin Manager, see README) ------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'
